# ISOLATED test/coverage environment.
# Does NOT touch the production database (own ephemeral pgvector + redis).
# Reuses the already-built backend image for its Python dependencies, but mounts
# the CURRENT working-tree code at /app so coverage reflects the live branch.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   docker compose -f docker-compose.test.yml exec -T test-backend \
#       sh -c 'TEST_USER_EMAIL=... pytest -m "not slow" ...'
#   docker compose -f docker-compose.test.yml down -v

services:
  test-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: maptimize
      POSTGRES_PASSWORD: test_only_pw
      POSTGRES_DB: maptimize_test
    tmpfs:
      - /var/lib/postgresql/data   # ephemeral - nothing persisted
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maptimize -d maptimize_test"]
      interval: 3s
      timeout: 3s
      retries: 20
    networks: [test-net]

  test-redis:
    image: redis:7-alpine
    networks: [test-net]

  test-backend:
    image: maptimize-maptimize-backend
    depends_on:
      test-db:
        condition: service_healthy
    # Root + ephemeral /app/data so import-time mkdir() (uploads/temp) succeeds
    # without polluting the host working tree.
    user: root
    environment:
      - DATABASE_URL=postgresql://maptimize:test_only_pw@test-db:5432/maptimize_test
      - REDIS_URL=redis://test-redis:6379
      - YOLO_MODEL_PATH=/app/weights/best.pt
      - GEMINI_API_KEY=
      # Never download models or touch the prod-shared GPU during tests.
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - HF_HOME=/tmp/hf
      - CUDA_VISIBLE_DEVICES=
      - COVERAGE_FILE=/app/.coverage
      - COVERAGE_RCFILE=/app/.coveragerc
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ./backend:/app
      - ./weights:/app/weights:ro
    tmpfs:
      - /app/data
    working_dir: /app
    # Clear the image entrypoint (its script is hidden by the ./backend mount).
    entrypoint: ["/bin/sh", "-c"]
    # Install test tooling, then run the app under coverage instrumentation.
    command:
      - "pip install --quiet --no-input 'coverage[toml]' pytest pytest-asyncio && exec python /app/tests/_coverage_launcher.py"
    ports:
      - "127.0.0.1:7900:8000"
    networks: [test-net]

networks:
  test-net:
    driver: bridge
