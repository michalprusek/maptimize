# ============================================================================
# maptalk MCP — tool registry
# ----------------------------------------------------------------------------
# This file IS the tool set. Edit it to add tools, rename them, or reword their
# descriptions — no code change needed. Changes are picked up automatically:
#   * a tool CALL always uses the current file (re-read on mtime change);
#   * the visible tool LIST refreshes when the MCP client reconnects.
#
# Each tool entry:
#   name        tool name shown to the model
#   description what the model reads to decide when to use it (keep it concrete)
#   handler     one of: http_json, http_post_json, document_pages, search_documents,
#               search_by_image, find_documents, move_document, read_page_region,
#               index_document, web_search
#               (composite handlers live in handlers.py; the rest proxy a REST call)
#   method/path backend REST endpoint (http_json / http_post_json)
#   annotations optional MCP hints: readOnlyHint / destructiveHint / idempotentHint
#               / openWorldHint (shape consent UX in the client; not a security gate)
#   params      inputs. `in:` is one of:
#                 query -> sent as a querystring param (maps_to overrides the key)
#                 path  -> substituted into {placeholder} in `path`
#                 body  -> JSON body field (http_post_json)
#                 arg   -> consumed by a composite handler, not sent verbatim
#               a param may carry `enum:` to constrain its allowed values.
# ============================================================================

tools:
  - name: search_documents
    description: >
      Semantic search over the library (scientific PDFs, lab protocols, papers).
      RETRIEVAL IS BUILT IN: by default it returns the matching page IMAGES so you
      can read and answer in one call. Set return=refs for a lightweight text list
      of page references (document, page, score) without the images — use that when
      you only need to locate pages. Set include_fov=true to also search microscopy
      field-of-view images. To read more pages of a specific hit, call
      read_document_pages; to zoom a small figure, read_page_region.
    handler: search_documents
    annotations:
      readOnlyHint: true
      openWorldHint: false
    params:
      - name: query
        in: arg
        type: string
        required: true
        description: Natural-language search query.
      - name: return
        in: arg
        type: string
        default: images
        enum: [images, refs]
        description: >
          images = return the matching page images (default, retrieval built in);
          refs = a text list of page references only.
      - name: include_fov
        in: arg
        type: boolean
        default: false
        description: Also search microscopy field-of-view (FOV) images.
      - name: limit
        in: arg
        type: integer
        default: 10
        description: Max hits (page images are capped at 10; refs up to 50).

  - name: read_document_pages
    annotations:
      readOnlyHint: true
      openWorldHint: false
    description: >
      Read the actual CONTENT of specific pages of a known document, returned as
      rendered page IMAGES. Returns up to `count` pages starting at `start_page`.
      Requires a document_id (from search_documents or find_documents). If a figure,
      table, or small label on a page is too small to read reliably, call
      read_page_region to zoom into that area at high resolution instead of guessing.
    handler: document_pages
    params:
      - name: document_id
        in: path
        type: integer
        required: true
        description: Id of the document to read.
      - name: start_page
        in: arg
        type: integer
        default: 1
        description: 1-based page number to start from.
      - name: count
        in: arg
        type: integer
        default: 5
        description: How many pages to return (hard-capped at 10 per call).

  - name: read_page_region
    annotations:
      readOnlyHint: true
      openWorldHint: false
    description: >
      ZOOM into one rectangular region of a document page and return it as a
      high-resolution image. Use this whenever a figure, sub-panel, table cell,
      colored marker, or small label is illegible on the full page (the full
      page is downsampled, so fine detail is lost). The region is re-rendered
      from the source PDF at high DPI, so the crop is crisp. Coordinates are
      normalized 0-1000 with the origin at the TOP-LEFT: ymin/xmin is the
      top-left corner, ymax/xmax the bottom-right. Estimate the box from the
      full page you already saw, then read the returned crop.
    handler: read_page_region
    params:
      - name: document_id
        in: arg
        type: integer
        required: true
        description: Id of the document.
      - name: page_number
        in: arg
        type: integer
        required: true
        description: 1-based page number.
      - name: ymin
        in: arg
        type: integer
        required: true
        description: Top edge, 0-1000 (0 = top of page).
      - name: xmin
        in: arg
        type: integer
        required: true
        description: Left edge, 0-1000 (0 = left of page).
      - name: ymax
        in: arg
        type: integer
        required: true
        description: Bottom edge, 0-1000 (> ymin).
      - name: xmax
        in: arg
        type: integer
        required: true
        description: Right edge, 0-1000 (> xmin).

  - name: web_search
    annotations:
      readOnlyHint: true
      openWorldHint: true
    description: >
      Search the public web and return a ranked list of result titles, URLs and
      snippets. Independent of the maptalk backend and its Gemini quota — safe
      to use for general questions and fact-checking.
    handler: web_search
    params:
      - name: query
        in: arg
        type: string
        required: true
        description: What to search the web for.
      - name: max_results
        in: arg
        type: integer
        default: 8
        description: How many results to return.

  - name: find_documents
    annotations:
      readOnlyHint: true
      openWorldHint: false
    description: >
      Filter the document library by METADATA only — name, DOI, file type,
      indexing status, page-count range, and folder. Returns document metadata
      (id, name, type, status, pages, dates), NOT page content. There is no
      full-text search (pages are stored as images, not OCR text) — to search
      content by meaning, use search_documents. Also use this to browse the
      library (optionally scoped to a folder) and get a document_id.
    handler: find_documents
    method: GET
    path: /api/rag/documents
    params:
      - name: name
        in: query
        type: string
        description: Substring match on the document name.
      - name: doi
        in: query
        type: string
        description: Substring match on the DOI.
      - name: file_type
        in: query
        type: string
        enum: [pdf, docx, pptx, xlsx, office, image, video, text]
        description: Exact file type.
      - name: status
        in: query
        type: string
        enum: [pending, processing, completed, failed]
        description: Indexing status.
      - name: min_pages
        in: query
        type: integer
        description: Minimum page count.
      - name: max_pages
        in: query
        type: integer
        description: Maximum page count.
      - name: limit
        in: query
        type: integer
        default: 50
        description: Max documents per page.
      - name: skip
        in: query
        type: integer
        default: 0
        description: >
          Offset for pagination. The response reports the total match count and
          the next skip value when more pages exist.
      - name: folder_id
        in: query
        type: integer
        description: >
          Scope to one folder (with in_folder=true). Get folder ids from
          list_folders.
      - name: in_folder
        in: query
        type: boolean
        description: >
          Set true to scope to folder_id; if folder_id is omitted, scopes to the
          top-level (root) folder.

  - name: get_document_metadata
    annotations:
      readOnlyHint: true
      openWorldHint: false
    description: >
      Get one document's metadata by id: name, file type, page count, indexing
      status/progress, size, and dates. Use it to check whether a document is
      fully indexed before reading it, or to confirm a document_id. Returns
      metadata only — use read_document_pages to read the content.
    handler: http_json
    method: GET
    path: /api/rag/documents/{document_id}
    params:
      - name: document_id
        in: path
        type: integer
        required: true

  - name: find_similar_pages
    annotations:
      readOnlyHint: true
      openWorldHint: false
    description: >
      Query-by-example: find pages similar to an EXISTING indexed page,
      document, or FOV image (by id). Returns page hits (use read_document_pages
      to view them).
    handler: http_json
    method: GET
    path: /api/rag/search/similar
    params:
      - name: page_id
        in: query
        type: integer
        description: Source page id.
      - name: document_id
        in: query
        type: integer
        description: Source document id (uses its first page).
      - name: image_id
        in: query
        type: integer
        description: Source FOV image id.
      - name: limit
        in: query
        type: integer
        default: 10

  - name: search_by_image
    annotations:
      readOnlyHint: true
      openWorldHint: false
    description: >
      Query-by-example with an AD-HOC image: find library pages similar to the
      given image (base64) and return them as image pages.
    handler: search_by_image
    params:
      - name: image_base64
        in: arg
        type: string
        required: true
        description: Base64-encoded query image.
      - name: filename
        in: arg
        type: string
        default: query.png
      - name: count
        in: arg
        type: integer
        default: 10
        description: How many page images to return (max 10).

  - name: search_by_text_example
    annotations:
      readOnlyHint: true
      openWorldHint: false
    description: >
      Find pages matching a pasted passage or description. mode=query for a short
      natural-language description, mode=passage for a long verbatim excerpt.
    handler: http_post_json
    method: POST
    path: /api/rag/search/by-text
    params:
      - name: text
        in: body
        type: string
        required: true
        description: The description or passage to match.
      - name: mode
        in: body
        type: string
        default: query
        enum: [query, passage]
        description: >
          query = a short natural-language description; passage = a long verbatim
          excerpt to match.
      - name: limit
        in: body
        type: integer
        default: 10

  - name: index_text
    annotations:
      readOnlyHint: false
      destructiveHint: false
    description: >
      Index a raw text snippet as a new searchable document in the user's
      library.
    handler: http_post_json
    method: POST
    path: /api/rag/documents/text
    params:
      - name: title
        in: body
        type: string
        required: true
        description: Title for the new document.
      - name: text
        in: body
        type: string
        required: true
        description: The text content to index.

  - name: index_document
    annotations:
      readOnlyHint: false
      destructiveHint: false
    description: >
      Index a new PDF / Office / image document into the library. Provide the
      file bytes as base64 plus a filename.
    handler: index_document
    params:
      - name: filename
        in: arg
        type: string
        required: true
        description: Original filename (extension decides the type).
      - name: content_base64
        in: arg
        type: string
        required: true
        description: Base64-encoded file bytes.

  - name: reindex_document
    annotations:
      readOnlyHint: false
      destructiveHint: false
      idempotentHint: true
    description: >
      Re-run indexing (page rendering + embeddings) for an existing document.
      Use this to recover a document whose status is `failed`, or to refresh one
      after an encoder change. Owner-only: you can only reindex your own
      documents, not group-shared ones. Safe to repeat.
    handler: http_post_json
    method: POST
    path: /api/rag/documents/{document_id}/reindex
    params:
      - name: document_id
        in: path
        type: integer
        required: true

  - name: delete_document
    annotations:
      readOnlyHint: false
      destructiveHint: true
      idempotentHint: false
    description: >
      Permanently delete a document and all its indexed pages from the library.
      This is IRREVERSIBLE — there is no undo. Owner-only: you cannot delete a
      group-shared document owned by someone else. Confirm the document_id (e.g.
      via find_documents) before calling.
    handler: http_json
    method: DELETE
    path: /api/rag/documents/{document_id}
    params:
      - name: document_id
        in: path
        type: integer
        required: true

  - name: get_indexing_status
    annotations:
      readOnlyHint: true
      openWorldHint: false
    description: >
      Show how many of your documents (and FOV images) are pending, processing,
      completed, or failed. Use it to check whether recently uploaded/indexed
      documents are ready to search or read yet, or to spot failures to reindex.
    handler: http_json
    method: GET
    path: /api/rag/indexing/status
    params: []

  - name: list_folders
    annotations:
      readOnlyHint: true
      openWorldHint: false
    description: >
      List the folders in the document library (id, name, parent_id). The tree is
      flat — reconstruct nesting from parent_id (parent_id null = a top-level
      folder). Use a folder's id with find_documents (folder_id + in_folder=true)
      or move_document.
    handler: http_json
    method: GET
    path: /api/rag/folders
    params: []

  - name: create_folder
    annotations:
      readOnlyHint: false
      destructiveHint: false
    description: >
      Create a new library folder. Optionally nest it under an existing folder by
      passing that folder's id as parent_id (omit for a top-level folder).
    handler: http_post_json
    method: POST
    path: /api/rag/folders
    params:
      - name: name
        in: body
        type: string
        required: true
        description: Folder name.
      - name: parent_id
        in: body
        type: integer
        description: Parent folder id; omit to create at the top level.

  - name: move_document
    annotations:
      readOnlyHint: false
      destructiveHint: false
    description: >
      Move a document into a folder. Pass the target folder's id as folder_id, or
      OMIT folder_id to move the document to the library root. Owner/group access
      applies (you can only move documents you can access).
    handler: move_document
    params:
      - name: document_id
        in: arg
        type: integer
        required: true
        description: Id of the document to move.
      - name: folder_id
        in: arg
        type: integer
        description: Target folder id; omit to move to the library root.

  # ==========================================================================
  # APPLICATION CONTROL — experiments, images + cell detection, proteins, DB.
  # These let the agent operate Maptimize like a human user. ACL is enforced
  # server-side by the SAME rules as the UI: reads are group-shared, writes are
  # OWNER-ONLY (you can only change/delete your own data). destructiveHint marks
  # irreversible tools so the client asks for confirmation.
  # ==========================================================================

  # -- Experiments -----------------------------------------------------------
  - name: list_experiments
    annotations: {readOnlyHint: true, openWorldHint: false}
    description: >
      List experiments you can see (your own plus any shared with you through
      your group). Returns id, name, description, status, assigned protein, and
      image/cell counts. Use it to find an experiment_id before reading or editing.
    handler: http_json
    method: GET
    path: /api/experiments
    params: []

  - name: get_experiment
    annotations: {readOnlyHint: true, openWorldHint: false}
    description: >
      Get one experiment by id, including its image summaries, counts, status and
      assigned MAP protein.
    handler: http_json
    method: GET
    path: /api/experiments/{experiment_id}
    params:
      - name: experiment_id
        in: path
        type: integer
        required: true

  - name: create_experiment
    annotations: {readOnlyHint: false, destructiveHint: false}
    description: >
      Create a new experiment owned by you. Only `name` is required; you can
      optionally assign a MAP protein (map_protein_id, from list_proteins) and a
      FASTA sequence. Add images afterwards with upload_image.
    handler: http_post_json
    method: POST
    path: /api/experiments
    params:
      - name: name
        in: body
        type: string
        required: true
        description: Experiment name (1-255 chars).
      - name: description
        in: body
        type: string
        description: Optional free-text description.
      - name: map_protein_id
        in: body
        type: integer
        description: Optional MAP protein to assign (id from list_proteins).
      - name: fasta_sequence
        in: body
        type: string
        description: Optional FASTA sequence for the experiment.

  - name: update_experiment
    annotations: {readOnlyHint: false, destructiveHint: false}
    description: >
      Update an experiment's name, description, status, or FASTA sequence. Only
      the fields you pass are changed. Owner-only. To change the assigned protein
      use assign_experiment_protein instead.
    handler: http_post_json
    method: PATCH
    path: /api/experiments/{experiment_id}
    params:
      - name: experiment_id
        in: path
        type: integer
        required: true
      - name: name
        in: body
        type: string
        description: New name (1-255 chars).
      - name: description
        in: body
        type: string
      - name: status
        in: body
        type: string
        enum: [draft, active, completed, archived]
        description: Experiment status.
      - name: fasta_sequence
        in: body
        type: string

  - name: delete_experiment
    annotations: {readOnlyHint: false, destructiveHint: true, idempotentHint: false}
    description: >
      Permanently delete an experiment AND all of its images and cell-detection
      crops (cascade). This is IRREVERSIBLE — there is no undo. Owner-only: you
      cannot delete a group-shared experiment owned by someone else. Confirm the
      experiment_id (e.g. via list_experiments) before calling.
    handler: http_json
    method: DELETE
    path: /api/experiments/{experiment_id}
    params:
      - name: experiment_id
        in: path
        type: integer
        required: true

  - name: assign_experiment_protein
    annotations: {readOnlyHint: false, destructiveHint: false}
    description: >
      Assign (or change) the MAP protein of an experiment. This cascades the
      protein to all of the experiment's images and cell crops. Pass the protein
      id from list_proteins; omit map_protein_id to unassign. Owner-only.
    handler: http_json
    method: PATCH
    path: /api/experiments/{experiment_id}/protein
    params:
      - name: experiment_id
        in: path
        type: integer
        required: true
      - name: map_protein_id
        in: query
        type: integer
        description: MAP protein id to assign; omit to clear the assignment.

  # -- Images & cell detection ----------------------------------------------
  - name: upload_image
    annotations: {readOnlyHint: false, destructiveHint: false}
    description: >
      Upload a microscopy image (TIFF/TIF/PNG/JPG/JPEG) into one of your
      experiments. Provide the file bytes as base64 plus the filename and the
      target experiment_id. The backend stores it and generates projections and a
      thumbnail; it does NOT run cell detection yet — call process_images with the
      returned image id to detect cells. Owner-only.
    handler: upload_image
    params:
      - name: experiment_id
        in: arg
        type: integer
        required: true
        description: Experiment to add the image to (you must own it).
      - name: filename
        in: arg
        type: string
        required: true
        description: Original filename; its extension decides the type.
      - name: content_base64
        in: arg
        type: string
        required: true
        description: Base64-encoded image bytes.

  - name: list_fov_images
    annotations: {readOnlyHint: true, openWorldHint: false}
    description: >
      List the field-of-view (FOV) microscopy images of an experiment, with their
      processing status, dimensions and cell counts. Use it to get image ids for
      get_image, process_images, reprocess_image or delete_image.
    handler: http_json
    method: GET
    path: /api/images/fovs
    params:
      - name: experiment_id
        in: query
        type: integer
        required: true
        description: Experiment whose images to list.

  - name: get_image
    annotations: {readOnlyHint: true, openWorldHint: false}
    description: >
      Get one image (FOV) by id, including its processing status, dimensions,
      assigned protein and cell count.
    handler: http_json
    method: GET
    path: /api/images/{image_id}
    params:
      - name: image_id
        in: path
        type: integer
        required: true

  - name: process_images
    annotations: {readOnlyHint: false, destructiveHint: false}
    description: >
      Run processing (projections + optional YOLO cell detection) on one or more
      already-uploaded images, by id. Pass detect_cells=true (default) to detect
      cells and create cell crops. This is the step that turns an uploaded image
      into detection results (read them with list_cell_crops). Owner-only;
      processing runs in the background, so poll get_image / list_fov_images for
      status.
    handler: http_post_json
    method: POST
    path: /api/images/batch-process
    params:
      - name: image_ids
        in: body
        type: array
        items: integer
        required: true
        description: Image ids to process (1-1000).
      - name: detect_cells
        in: body
        type: boolean
        default: true
        description: Run YOLO cell detection (true) or just projections (false).

  - name: reprocess_image
    annotations: {readOnlyHint: false, destructiveHint: false, idempotentHint: true}
    description: >
      Re-run processing for a single image: deletes its existing cell crops and
      regenerates them. Use it to redo detection after a change. detect_cells
      overrides the image's setting (omit to keep it). Fails if the source file
      was discarded. Owner-only.
    handler: http_json
    method: POST
    path: /api/images/{image_id}/reprocess
    params:
      - name: image_id
        in: path
        type: integer
        required: true
      - name: detect_cells
        in: query
        type: boolean
        description: Override detection on/off; omit to keep the image's setting.

  - name: redetect_cells
    annotations: {readOnlyHint: false, destructiveHint: false, idempotentHint: true}
    description: >
      Re-run YOLO cell detection on several images at once (by id): deletes their
      existing crops and detects again. Owner-only; runs in the background.
    handler: http_post_json
    method: POST
    path: /api/images/batch-redetect
    params:
      - name: image_ids
        in: body
        type: array
        items: integer
        required: true
        description: Image ids to re-detect.

  - name: delete_image
    annotations: {readOnlyHint: false, destructiveHint: true, idempotentHint: false}
    description: >
      Permanently delete one image and all of its cell-detection crops (cascade).
      IRREVERSIBLE. Owner-only. Confirm the image_id (e.g. via list_fov_images)
      before calling.
    handler: http_json
    method: DELETE
    path: /api/images/{image_id}
    params:
      - name: image_id
        in: path
        type: integer
        required: true

  - name: list_cell_crops
    annotations: {readOnlyHint: true, openWorldHint: false}
    description: >
      List the detected cell crops (detection results) of an experiment: bounding
      box, detection confidence, and computed metrics (bundleness, intensity,
      skewness, kurtosis). Set exclude_excluded=true to skip crops flagged as
      excluded. This is how you read what cell detection produced.
    handler: http_json
    method: GET
    path: /api/images/crops
    params:
      - name: experiment_id
        in: query
        type: integer
        required: true
        description: Experiment whose cell crops to list.
      - name: exclude_excluded
        in: query
        type: boolean
        description: Skip crops flagged as excluded.

  # -- Proteins (shared reference data) --------------------------------------
  - name: list_proteins
    annotations: {readOnlyHint: true, openWorldHint: false}
    description: >
      List all MAP proteins (shared reference data): id, name, full name, gene,
      organism, UniProt id, sequence length. Use it to get a map_protein_id for
      create_experiment or assign_experiment_protein.
    handler: http_json
    method: GET
    path: /api/proteins
    params: []

  - name: get_protein
    annotations: {readOnlyHint: true, openWorldHint: false}
    description: Get one MAP protein by id, with its full metadata.
    handler: http_json
    method: GET
    path: /api/proteins/{protein_id}
    params:
      - name: protein_id
        in: path
        type: integer
        required: true

  - name: create_protein
    annotations: {readOnlyHint: false, destructiveHint: false}
    description: >
      Create a new MAP protein (shared reference data — visible to everyone). Only
      `name` is required (must be unique); a display color is auto-picked if you
      omit it. Optionally set full_name, description, color (#rrggbb), uniprot_id,
      fasta_sequence, gene_name, organism.
    handler: http_post_json
    method: POST
    path: /api/proteins
    params:
      - name: name
        in: body
        type: string
        required: true
        description: Unique protein name (1-100 chars).
      - name: full_name
        in: body
        type: string
      - name: description
        in: body
        type: string
      - name: color
        in: body
        type: string
        description: Hex color like "#1f77b4"; auto-picked if omitted.
      - name: uniprot_id
        in: body
        type: string
      - name: fasta_sequence
        in: body
        type: string
      - name: gene_name
        in: body
        type: string
      - name: organism
        in: body
        type: string

  - name: update_protein
    annotations: {readOnlyHint: false, destructiveHint: false}
    description: >
      Update a MAP protein's fields (only the ones you pass are changed). Shared
      reference data — changes are visible to everyone.
    handler: http_post_json
    method: PATCH
    path: /api/proteins/{protein_id}
    params:
      - name: protein_id
        in: path
        type: integer
        required: true
      - name: name
        in: body
        type: string
        description: New unique name (1-100 chars).
      - name: full_name
        in: body
        type: string
      - name: description
        in: body
        type: string
      - name: color
        in: body
        type: string
        description: Hex color like "#1f77b4".
      - name: uniprot_id
        in: body
        type: string
      - name: fasta_sequence
        in: body
        type: string
      - name: gene_name
        in: body
        type: string
      - name: organism
        in: body
        type: string

  - name: delete_protein
    annotations: {readOnlyHint: false, destructiveHint: true, idempotentHint: false}
    description: >
      Permanently delete a MAP protein. IRREVERSIBLE. Refused (409) if any image
      still references it — reassign or delete those first. Shared reference data.
    handler: http_json
    method: DELETE
    path: /api/proteins/{protein_id}
    params:
      - name: protein_id
        in: path
        type: integer
        required: true

  - name: compute_protein_embedding
    annotations: {readOnlyHint: false, destructiveHint: false, idempotentHint: true}
    description: >
      Compute (or refresh) the ESM-C sequence embedding for a protein from its
      FASTA sequence, so it can be placed on the protein UMAP. Requires the protein
      to have a fasta_sequence. Safe to repeat.
    handler: http_post_json
    method: POST
    path: /api/proteins/{protein_id}/compute-embedding
    params:
      - name: protein_id
        in: path
        type: integer
        required: true

  # -- Database (read-only) --------------------------------------------------
  - name: query_database
    annotations: {readOnlyHint: true, openWorldHint: false}
    description: >
      Run a READ-ONLY SQL SELECT over your data and return the rows. A per-user
      access filter is injected automatically, so you only ever see your own rows
      plus group-shared experiments — you cannot read other users' private data.
      Only a single SELECT is allowed: NO INSERT/UPDATE/DELETE, no subqueries, no
      CTEs (WITH), no UNION/INTERSECT/EXCEPT, no SQL comments, no multiple
      statements. Joins must be explicit `JOIN ... ON` (no comma joins). Because
      images and cell_crops have no owner column, a query on them MUST JOIN
      experiments (images.experiment_id = experiments.id, and cell_crops.image_id
      = images.id). Allowed tables and columns:
      experiments(id, name, description, status, map_protein_id, group_id,
      fasta_sequence, created_at, updated_at);
      images(id, experiment_id, map_protein_id, original_filename, width, height,
      z_slices, file_size, status, created_at, processed_at);
      cell_crops(id, image_id, map_protein_id, bbox_x, bbox_y, bbox_w, bbox_h,
      detection_confidence, bundleness_score, mean_intensity, skewness, kurtosis,
      excluded, created_at);
      map_proteins(id, name, full_name, uniprot_id, gene_name, organism,
      sequence_length) [shared, no user filter];
      comparisons(id, user_id, crop_a_id, crop_b_id, winner_id, response_time_ms,
      undone, timestamp);
      user_ratings(id, user_id, cell_crop_id, mu, sigma, comparison_count,
      created_at, updated_at);
      rag_documents(id, name, file_type, status, page_count, thread_id,
      created_at);
      rag_document_pages(id, document_id, page_number) [must JOIN rag_documents].
      For document CONTENT use search_documents, not SQL (page text is not stored
      as SQL). Example: SELECT status, COUNT(*) FROM images JOIN experiments ON
      images.experiment_id = experiments.id GROUP BY status.
    handler: http_post_json
    method: POST
    path: /api/query
    params:
      - name: sql
        in: body
        type: string
        required: true
        description: A single read-only SELECT over the allowed tables.
      - name: limit
        in: body
        type: integer
        description: Max rows to return (default 100, capped at 1000).
