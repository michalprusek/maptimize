# ============================================================================
# maptalk MCP — tool registry
# ----------------------------------------------------------------------------
# This file IS the tool set. Edit it to add tools, rename them, or reword their
# descriptions — no code change needed. Changes are picked up automatically:
#   * a tool CALL always uses the current file (re-read on mtime change);
#   * the visible tool LIST refreshes when the MCP client reconnects.
#
# Each tool entry:
#   name        tool name shown to the model
#   description what the model reads to decide when to use it (keep it concrete)
#   handler     http_json | document_pages | web_search
#   method/path backend REST endpoint (http_json only)
#   params      inputs. `in:` is one of:
#                 query -> sent as a querystring param (maps_to overrides the key)
#                 path  -> substituted into {placeholder} in `path`
#                 arg   -> consumed by a composite handler, not sent verbatim
# ============================================================================

tools:
  - name: search_documents
    description: >
      Semantically search the user's indexed maptalk library documents
      (scientific PDFs, lab protocols, papers). Returns the most relevant PAGES
      with a similarity score, document id, document name, page number, and —
      when available — a short text excerpt. Use this to find WHERE information
      lives, then call read_document_pages to actually read those pages.
    handler: http_json
    method: GET
    path: /api/rag/search/documents
    params:
      - name: query
        in: query
        maps_to: q
        type: string
        required: true
        description: Natural-language search query.
      - name: limit
        in: query
        type: integer
        default: 20
        description: Maximum number of page hits to return (1-100).

  - name: semantic_search
    description: >
      Combined semantic search over BOTH indexed documents and microscopy
      field-of-view (FOV) images. Returns ranked document-page hits and image
      hits. Prefer search_documents when you only care about documents.
    handler: http_json
    method: GET
    path: /api/rag/search
    params:
      - name: query
        in: query
        maps_to: q
        type: string
        required: true
        description: Natural-language search query.
      - name: doc_limit
        in: query
        type: integer
        default: 10
        description: Max document-page hits (1-50).
      - name: fov_limit
        in: query
        type: integer
        default: 10
        description: Max microscopy-image hits (1-50).

  - name: list_documents
    description: >
      List the user's indexed library documents with metadata (id, name, file
      type, page count, indexing status, size, dates). Use this to see what is
      available before searching or reading, or to get a document_id.
    handler: http_json
    method: GET
    path: /api/rag/documents
    params:
      - name: status
        in: query
        type: string
        description: Optional filter — pending, processing, completed or failed.
      - name: limit
        in: query
        type: integer
        default: 100
        description: Maximum number of documents to return (1-100).

  - name: read_document_pages
    description: >
      Read the actual CONTENT of a document. maptalk is a Vision-RAG system, so
      page content is returned as rendered page IMAGES (which you can read
      directly), not plain text. Returns up to `count` pages starting at
      `start_page`. Requires a document_id.
    handler: document_pages
    params:
      - name: document_id
        in: path
        type: integer
        required: true
        description: Id of the document to read.
      - name: start_page
        in: arg
        type: integer
        default: 1
        description: 1-based page number to start from.
      - name: count
        in: arg
        type: integer
        default: 5
        description: How many pages to return (hard-capped at 10 per call).

  - name: web_search
    description: >
      Search the public web and return a ranked list of result titles, URLs and
      snippets. Independent of the maptalk backend and its Gemini quota — safe
      to use for general questions and fact-checking.
    handler: web_search
    params:
      - name: query
        in: arg
        type: string
        required: true
        description: What to search the web for.
      - name: max_results
        in: arg
        type: integer
        default: 8
        description: How many results to return.

  - name: semantic_image_search
    description: >
      Semantic search over the library that returns the top matching pages as
      rendered IMAGES you can read directly (maptalk is Vision-RAG). Best default
      for "find and show me the relevant pages".
    handler: semantic_image_search
    params:
      - name: query
        in: arg
        type: string
        required: true
        description: Natural-language search query.
      - name: count
        in: arg
        type: integer
        default: 10
        description: How many page images to return (max 10).

  - name: find_documents
    description: >
      Filter/search documents by metadata — name, DOI, file type, status, page
      count — and by full text over the pages' OCR text. Returns document
      metadata (not page images).
    handler: http_json
    method: GET
    path: /api/rag/documents
    params:
      - name: name
        in: query
        type: string
        description: Substring match on the document name.
      - name: doi
        in: query
        type: string
        description: Substring match on the DOI.
      - name: file_type
        in: query
        type: string
        description: Exact file type (e.g. pdf, image, text).
      - name: status
        in: query
        type: string
        description: pending | processing | completed | failed.
      - name: min_pages
        in: query
        type: integer
        description: Minimum page count.
      - name: max_pages
        in: query
        type: integer
        description: Maximum page count.
      - name: limit
        in: query
        type: integer
        default: 50
        description: Max documents to return.

  - name: get_document_metadata
    description: Get one document's metadata and indexing status.
    handler: http_json
    method: GET
    path: /api/rag/documents/{document_id}
    params:
      - name: document_id
        in: path
        type: integer
        required: true

  - name: find_similar_pages
    description: >
      Query-by-example: find pages similar to an EXISTING indexed page,
      document, or FOV image (by id). Returns page hits (use read_document_pages
      to view them).
    handler: http_json
    method: GET
    path: /api/rag/search/similar
    params:
      - name: page_id
        in: query
        type: integer
        description: Source page id.
      - name: document_id
        in: query
        type: integer
        description: Source document id (uses its first page).
      - name: image_id
        in: query
        type: integer
        description: Source FOV image id.
      - name: limit
        in: query
        type: integer
        default: 10

  - name: search_by_image
    description: >
      Query-by-example with an AD-HOC image: find library pages similar to the
      given image (base64) and return them as image pages.
    handler: search_by_image
    params:
      - name: image_base64
        in: arg
        type: string
        required: true
        description: Base64-encoded query image.
      - name: filename
        in: arg
        type: string
        default: query.png
      - name: count
        in: arg
        type: integer
        default: 10
        description: How many page images to return (max 10).

  - name: search_by_text_example
    description: >
      Find pages matching a pasted passage or description. mode=query for a short
      natural-language description, mode=passage for a long verbatim excerpt.
    handler: http_post_json
    method: POST
    path: /api/rag/search/by-text
    params:
      - name: text
        in: body
        type: string
        required: true
        description: The description or passage to match.
      - name: mode
        in: body
        type: string
        default: query
        description: query | passage.
      - name: limit
        in: body
        type: integer
        default: 10

  - name: index_text
    description: >
      Index a raw text snippet as a new searchable document in the user's
      library.
    handler: http_post_json
    method: POST
    path: /api/rag/documents/text
    params:
      - name: title
        in: body
        type: string
        required: true
        description: Title for the new document.
      - name: text
        in: body
        type: string
        required: true
        description: The text content to index.

  - name: index_document
    description: >
      Index a new PDF / Office / image document into the library. Provide the
      file bytes as base64 plus a filename.
    handler: index_document
    params:
      - name: filename
        in: arg
        type: string
        required: true
        description: Original filename (extension decides the type).
      - name: content_base64
        in: arg
        type: string
        required: true
        description: Base64-encoded file bytes.

  - name: reindex_document
    description: Re-index an existing document (owner only). Fixes a failed/stale document.
    handler: http_post_json
    method: POST
    path: /api/rag/documents/{document_id}/reindex
    params:
      - name: document_id
        in: path
        type: integer
        required: true

  - name: delete_document
    description: Delete a document from the library (owner only).
    handler: http_json
    method: DELETE
    path: /api/rag/documents/{document_id}
    params:
      - name: document_id
        in: path
        type: integer
        required: true

  - name: get_indexing_status
    description: Show pending/processing/completed/failed indexing counts for the user.
    handler: http_json
    method: GET
    path: /api/rag/indexing/status
    params: []
